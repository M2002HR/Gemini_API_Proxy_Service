app:
  host: 0.0.0.0
  port: 8000
  log_level: INFO
  request_timeout_sec: 120
  enable_docs: true
  docs_url: /docs
  redoc_url: /redoc
  openapi_url: /openapi.json

proxy:
  mode: cloudflare_worker
  trust_env_proxy: true
  retry_on_429: true
  retry_on_5xx: true
  max_retries_per_key: 2
  max_retries_on_5xx: 4
  retry_backoff_sec: 0.35
  cooloff_sec: 30
  min_interval_sec: 0

gemini:
  base_url: https://generativelanguage.googleapis.com
  api_version: v1beta
  default_model: gemini-2.5-flash
  api_keys: []
  default_request:
    generationConfig:
      temperature: 0.3

cloudflare:
  worker_base_urls:
    - https://your-worker-subdomain.workers.dev
  worker_route_prefix: /gemini
  auth_token: ""
  auth_header_name: x-worker-auth
  access_client_id: ""
  access_client_secret: ""
  pass_trace_headers: true

admin:
  enabled: true
  require_auth: false
  token: ""
  header_name: x-admin-token
  models_cache_ttl_sec: 300
  max_recent_requests: 2000
  max_incidents: 500
